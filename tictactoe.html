<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #1a1208;
    --surface: #2a1e10;
    --cell:    #352818;
    --rust:    #9b3d22;
    --orange:  #c4703a;
    --mustard: #c49a28;
    --text:    #d4c4a0;
    --muted:   #7a6a50;
    --border:  #4a3820;
  }

  body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: var(--text);
  }

  /* ── MODE SELECT ── */
  #mode-screen {
    text-align: center;
  }

  #mode-screen h1 {
    font-size: 2.8rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--mustard);
    margin-bottom: 8px;
  }

  #mode-screen p {
    color: var(--muted);
    margin-bottom: 48px;
    font-size: 0.95rem;
    letter-spacing: 1px;
  }

  .mode-cards {
    display: flex;
    gap: 20px;
    justify-content: center;
  }

  .mode-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    cursor: pointer;
    width: 200px;
    transition: border-color 0.2s, transform 0.15s;
  }

  .mode-card:hover {
    border-color: var(--orange);
    transform: translateY(-4px);
  }

  .mode-icon { font-size: 3rem; margin-bottom: 16px; }

  .mode-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .mode-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ── GAME SCREEN ── */
  #game-screen { display: none; text-align: center; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .back-btn {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .back-btn:hover { border-color: var(--orange); color: var(--orange); }

  .game-title {
    font-size: 1.4rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mustard);
  }

  .spacer { width: 80px; }

  .status {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 24px;
    height: 26px;
    letter-spacing: 0.5px;
  }

  .status .highlight { font-weight: 700; }
  .x-color  { color: var(--rust); }
  .o-color  { color: var(--mustard); }

  /* scores */
  .scores {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .score-box {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 24px;
    min-width: 80px;
    border: 1px solid var(--border);
  }

  .score-label {
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .score-num { font-size: 1.8rem; font-weight: 700; }
  .x-box .score-num  { color: var(--rust); }
  .o-box .score-num  { color: var(--mustard); }
  .draw-box .score-num { color: var(--muted); }

  /* board */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    grid-template-rows: repeat(3, 110px);
    gap: 10px;
    margin: 0 auto 28px;
    width: fit-content;
  }

  .cell {
    background: var(--cell);
    border-radius: 12px;
    font-size: 2.8rem;
    font-weight: 900;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
    border: 1.5px solid var(--border);
  }

  .cell:hover:not(.taken) {
    background: #3e2e18;
    border-color: var(--orange);
    transform: scale(1.04);
  }

  .cell.x { color: var(--rust); cursor: default; }
  .cell.o { color: var(--mustard); cursor: default; }

  .cell.win {
    border-color: var(--orange);
    background: #3e2010;
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .thinking .cell:not(.taken) { cursor: not-allowed; }

  /* buttons */
  .btn-row { display: flex; justify-content: center; gap: 12px; }

  .btn-primary {
    background: var(--rust);
    color: var(--text);
    border: none;
    border-radius: 10px;
    padding: 11px 32px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-primary:hover { background: var(--orange); transform: scale(1.03); }
</style>
</head>
<body>

<!-- MODE SELECT -->
<div id="mode-screen">
  <h1>Tic Tac Toe</h1>
  <p>Choose your mode</p>
  <div class="mode-cards">
    <div class="mode-card" onclick="startGame('human')">
      <div class="mode-icon">👥</div>
      <div class="mode-title">vs Player</div>
      <div class="mode-desc">Two players, one board. Pass and play.</div>
    </div>
    <div class="mode-card" onclick="startGame('cpu')">
      <div class="mode-icon">🤖</div>
      <div class="mode-title">vs Computer</div>
      <div class="mode-desc">Go head to head against an unbeatable AI.</div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="game-title" id="game-title">vs Player</div>
    <div class="spacer"></div>
  </div>

  <div class="status" id="status"></div>

  <div class="scores">
    <div class="score-box x-box">
      <div class="score-label" id="label-x">Player X</div>
      <div class="score-num" id="score-x">0</div>
    </div>
    <div class="score-box draw-box">
      <div class="score-label">Draws</div>
      <div class="score-num" id="score-draw">0</div>
    </div>
    <div class="score-box o-box">
      <div class="score-label" id="label-o">Player O</div>
      <div class="score-num" id="score-o">0</div>
    </div>
  </div>

  <div class="board" id="board">
    <div class="cell" onclick="play(0)"></div>
    <div class="cell" onclick="play(1)"></div>
    <div class="cell" onclick="play(2)"></div>
    <div class="cell" onclick="play(3)"></div>
    <div class="cell" onclick="play(4)"></div>
    <div class="cell" onclick="play(5)"></div>
    <div class="cell" onclick="play(6)"></div>
    <div class="cell" onclick="play(7)"></div>
    <div class="cell" onclick="play(8)"></div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="resetBoard()">New Game</button>
  </div>
</div>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board, current, gameOver, mode;
  let scores = { X: 0, O: 0, draw: 0 };

  const cells       = document.querySelectorAll('.cell');
  const statusEl    = document.getElementById('status');
  const boardEl     = document.getElementById('board');

  function startGame(selectedMode) {
    mode = selectedMode;
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('game-title').textContent = mode === 'cpu' ? 'vs Computer' : 'vs Player';
    document.getElementById('label-x').textContent = 'You (X)';
    document.getElementById('label-o').textContent = mode === 'cpu' ? 'CPU (O)' : 'Player O';
    scores = { X: 0, O: 0, draw: 0 };
    updateScoreDisplay();
    resetBoard();
  }

  function goBack() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('mode-screen').style.display = 'block';
  }

  function resetBoard() {
    board    = Array(9).fill(null);
    gameOver = false;
    current  = 'X';
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    boardEl.classList.remove('thinking');
    setStatus(`<span class="highlight x-color">X</span>'s turn`);
  }

  function play(i) {
    if (gameOver || board[i] || boardEl.classList.contains('thinking')) return;
    makeMove(i, current);
    if (!gameOver && mode === 'cpu' && current === 'O') cpuTurn();
  }

  function makeMove(i, player) {
    board[i] = player;
    cells[i].textContent = player;
    cells[i].classList.add(player.toLowerCase(), 'taken');

    const winLine = getWin();
    if (winLine) {
      winLine.forEach(idx => cells[idx].classList.add('win'));
      scores[player]++;
      updateScoreDisplay();
      const label = (mode === 'cpu' && player === 'O') ? 'Computer' : `Player ${player}`;
      setStatus(`<span class="highlight ${player.toLowerCase()}-color">${label}</span> wins! 🎉`);
      gameOver = true;
    } else if (board.every(Boolean)) {
      scores.draw++;
      updateScoreDisplay();
      setStatus(`It's a draw! 🤝`);
      gameOver = true;
    } else {
      current = player === 'X' ? 'O' : 'X';
      if (mode === 'cpu' && current === 'O') {
        setStatus(`<span class="highlight o-color">Computer</span> is thinking…`);
      } else {
        setStatus(`<span class="highlight ${current.toLowerCase()}-color">${current}</span>'s turn`);
      }
    }
  }

  function cpuTurn() {
    boardEl.classList.add('thinking');
    setTimeout(() => {
      if (!gameOver) {
        makeMove(bestMove(), 'O');
      }
      boardEl.classList.remove('thinking');
      if (!gameOver) setStatus(`<span class="highlight x-color">X</span>'s turn`);
    }, 420);
  }

  // ── minimax ──
  function bestMove() {
    let best = -Infinity, move = -1;
    board.forEach((v, i) => {
      if (!v) {
        board[i] = 'O';
        const score = minimax(board, false);
        board[i] = null;
        if (score > best) { best = score; move = i; }
      }
    });
    return move;
  }

  function minimax(b, isMax) {
    const w = getWinFor(b);
    if (w === 'O') return  10;
    if (w === 'X') return -10;
    if (b.every(Boolean)) return 0;

    if (isMax) {
      let best = -Infinity;
      b.forEach((v, i) => {
        if (!v) { b[i] = 'O'; best = Math.max(best, minimax(b, false)); b[i] = null; }
      });
      return best;
    } else {
      let best = Infinity;
      b.forEach((v, i) => {
        if (!v) { b[i] = 'X'; best = Math.min(best, minimax(b, true)); b[i] = null; }
      });
      return best;
    }
  }

  function getWin() { return getWinFor(board); }

  function getWinFor(b) {
    for (const [a, m, c] of WINS) {
      if (b[a] && b[a] === b[m] && b[a] === b[c]) return b[a];
    }
    return null;
  }

  function getWinLine() {
    return WINS.find(([a, m, c]) => board[a] && board[a] === board[m] && board[a] === board[c]) || null;
  }

  function setStatus(html) { statusEl.innerHTML = html; }

  function updateScoreDisplay() {
    document.getElementById('score-x').textContent    = scores.X;
    document.getElementById('score-o').textContent    = scores.O;
    document.getElementById('score-draw').textContent = scores.draw;
  }
</script>
</body>
</html>
